<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus / Settings</title>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('nexus-theme') || 'light');
document.documentElement.setAttribute('data-skin', 'fresh');</script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="sidebar" id="sidebar"></div>
<div class="main">
  <div class="topbar">
    <div class="breadcrumb">NEXUS / SETTINGS</div>
  </div>
  <div id="oauth-banner" class="oauth-banner" style="display:none"></div>
  <div class="settings-tabs">
    <button class="ann-tab active" data-settings-tab="connections">Connections</button>
    <button class="ann-tab" data-settings-tab="messages">Messages</button>
    <button class="ann-tab" data-settings-tab="profile">AI &amp; Profile</button>
    <button class="ann-tab" data-settings-tab="sidebar">Sidebar</button>
    <button class="ann-tab" data-settings-tab="support">Support</button>
  </div>
  <div id="settings-root"><div class="muted">Loading…</div></div>
</div>
<script src="/static/app.js?v=25"></script>
<script>initSettings();</script>
</body>
</html>
