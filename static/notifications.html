<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus / Notifications</title>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('nexus-theme') || 'light');
document.documentElement.setAttribute('data-skin', 'fresh');</script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="sidebar" id="sidebar"></div>
<div class="main">
  <div class="topbar">
    <div class="breadcrumb">NEXUS / NOTIFICATIONS</div>
    <a class="btn" href="/settings">Message settings</a>
  </div>

  <div class="section-h">NOTIFICATION FEED
    <button type="button" class="btn" id="notif-mark-all" style="margin-left:auto">Mark all read</button>
  </div>
  <div class="ann-tabs">
    <button class="ann-tab active" data-notif-tab="">All</button>
    <button class="ann-tab" data-notif-tab="task">Tasks</button>
    <button class="ann-tab" data-notif-tab="grade">Grades</button>
    <button class="ann-tab" data-notif-tab="announcement">Announcements</button>
    <button class="ann-tab" data-notif-tab="club">Clubs</button>
    <button class="ann-tab" data-notif-tab="other">Other</button>
  </div>
  <div id="notif-feed" class="notif-feed"><div class="muted">Loading…</div></div>
</div>
<script src="/static/app.js?v=25"></script>
<script>initNotifications();</script>
</body>
</html>
