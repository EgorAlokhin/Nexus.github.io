<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus / Sign in</title>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('nexus-theme') || 'light');
document.documentElement.setAttribute('data-skin', localStorage.getItem('nexus-skin') || 'fresh');</script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">NEXUS</div>
    <p class="auth-sub muted">Your classes, grades, deadlines and reminders in one place.</p>

    <div class="auth-tabs">
      <button type="button" class="auth-tab active" data-auth-tab="login">Sign in</button>
      <button type="button" class="auth-tab" data-auth-tab="register">Create account</button>
    </div>

    <form id="auth-form" class="auth-form" autocomplete="on">
      <div id="auth-name-row" class="cred-field" style="display:none">
        <span>First name</span>
        <input id="auth-name" type="text" autocomplete="given-name" placeholder="optional">
      </div>
      <label class="cred-field"><span>Email</span>
        <input id="auth-email" type="email" autocomplete="email" required></label>
      <label class="cred-field"><span>Password</span>
        <input id="auth-password" type="password" autocomplete="current-password" required minlength="8"></label>
      <button type="submit" class="btn auth-primary" id="auth-submit">Sign in</button>
    </form>

    <div id="auth-status" class="login-status muted"></div>

    <div class="auth-divider"><span>or</span></div>
    <a class="btn auth-google" href="/auth/google">Continue with Google</a>

    <p class="auth-note muted">
      Connect Veracross, Accelerate, and your phone later from your Account — all optional.
      Each person gets their own private account.
    </p>
  </div>
</div>
<script src="/static/app.js?v=20"></script>
<script>initLogin();</script>
</body>
</html>
