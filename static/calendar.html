<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus / Calendar</title>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('nexus-theme') || 'light');</script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="sidebar" id="sidebar"></div>
<div class="main">
  <div class="topbar">
    <div class="breadcrumb">NEXUS / CALENDAR</div>
  </div>

  <div class="cal-layout">
    <div class="cal-main">
      <div class="cal-head">
        <button onclick="calMove(-1)">Prev</button>
        <div class="section-h" id="cal-title"></div>
        <button onclick="calMove(1)">Next</button>
      </div>
      <div id="cal-overdue" class="cal-overdue" hidden></div>
      <div id="cal-undated" class="cal-overdue" hidden></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="detail-panel cal-detail-bottom" id="detail">
      <div class="cal-detail-head">
        <div class="section-h" id="detail-title">DAY / TASK</div>
        <div class="muted" id="detail-hint">Click a day with +more or any task.</div>
      </div>
      <div id="detail-body" class="cal-detail-strip"></div>
    </div>
  </div>
</div>
<script src="/static/app.js?v=12"></script>
<script>initCalendar();</script>
</body>
</html>
