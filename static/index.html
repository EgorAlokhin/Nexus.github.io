<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus / Dashboard</title>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('nexus-theme') || 'light');</script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="sidebar" id="sidebar"></div>
<div class="main">
  <div class="topbar">
    <div class="breadcrumb">NEXUS / DASHBOARD</div>
    <div class="topbar-right">
      <span class="date" id="today"></span>
      <button onclick="syncAll(this)">Sync All</button>
    </div>
  </div>

  <div class="status-row" id="status"></div>

  <div class="overload" id="overload" style="display:none;"></div>

  <div class="section-h">URGENT <span class="badge" id="urgent-count">0</span>
    <a href="/completed" class="section-link muted">Completed →</a></div>
  <div class="cards" id="cards"></div>

  <div id="dash-undated" class="cal-overdue" hidden></div>

  <div class="filters">
    <select id="f-source">
      <option value="">All sources</option>
      <option value="gmail">Gmail</option>
      <option value="classroom">Classroom</option>
      <option value="buzz">Buzz</option>
      <option value="veracross">Veracross</option>
    </select>
    <select id="f-sort">
      <option value="due">Sort: Due date</option>
      <option value="priority">Sort: Priority</option>
    </select>
  </div>

  <table id="task-table">
    <thead><tr><th>Title</th><th>Course</th><th>Source</th><th>Due</th><th>Priority</th><th>Done</th></tr></thead>
    <tbody></tbody>
  </table>
</div>
<script src="/static/app.js?v=10"></script>
<script>initDashboard();</script>
</body>
</html>
